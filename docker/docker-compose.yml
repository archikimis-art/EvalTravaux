version: "3.9"

services:
  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    command: pnpm dev:web
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ..:/app
    depends_on:
      - api
    environment:
      - NODE_ENV=development

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    command: pnpm dev:api
    working_dir: /app
    ports:
      - "3001:3001"
    volumes:
      - ..:/app
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://postgres:postgres@db:5432/evaltravaux
      - REDIS_URL=redis://redis:6379

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: evaltravaux
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:

